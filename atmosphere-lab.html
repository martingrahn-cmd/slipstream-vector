<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>ATMOSPHERE LAB — tune the worlds</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #07060f; color: #dfe6ff; font-family: 'Rajdhani', system-ui, sans-serif; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #panel { position: fixed; top: 0; left: 0; bottom: 0; width: 300px; overflow-y: auto; padding: 14px 14px 40px;
           background: rgba(7, 6, 15, 0.92); border-right: 1px solid #241a3a; backdrop-filter: blur(4px); }
  h1 { font-size: 15px; letter-spacing: 0.2em; color: #7df9ff; margin: 2px 0 10px; font-weight: 800; }
  .worlds, .views { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .worlds button, .views button, #export, #reset { font-family: inherit; font-weight: 700; letter-spacing: 0.08em; font-size: 11px;
    padding: 7px 12px; background: #14102a; color: #b9c4e8; border: 1px solid #2a2050; cursor: pointer; }
  .worlds button.on { background: #7df9ff; color: #05040c; }
  .grp { font-size: 10px; letter-spacing: 0.2em; color: #6a6a8f; margin: 14px 0 6px; font-weight: 800; }
  .row { display: grid; grid-template-columns: 92px 1fr auto; gap: 8px; align-items: center; margin-bottom: 5px; }
  .row label { font-size: 11.5px; letter-spacing: 0.04em; color: #c8d0ee; }
  .row input[type=color] { width: 100%; height: 22px; border: 1px solid #2a2050; background: none; padding: 0; cursor: pointer; }
  .row input[type=range] { width: 100%; }
  .row .val { font-size: 10px; color: #6a6a8f; min-width: 34px; text-align: right; font-family: monospace; }
  .foot { display: flex; gap: 8px; margin-top: 16px; }
  #out { width: 100%; height: 170px; margin-top: 10px; background: #05040c; color: #9ff7c0; border: 1px solid #2a2050;
         font-family: monospace; font-size: 10px; padding: 8px; display: none; }
  #hint { position: fixed; right: 14px; top: 10px; font-size: 11px; letter-spacing: 0.08em; color: #8a93b8; text-align: right; }
  #busy { position: fixed; right: 14px; bottom: 12px; font-size: 11px; letter-spacing: 0.14em; color: #7df9ff; opacity: 0; transition: opacity 150ms; }
</style>
<script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.172.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.172.0/examples/jsm/"
  } }
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <h1>ATMOSPHERE LAB</h1>
  <div class="worlds" id="worlds"></div>
  <div class="views" id="views"></div>
  <div class="row"><label>track pos</label><input id="spos" type="range" min="0" max="1" step="0.002" value="0.35"><span class="val" id="sposv">35%</span></div>
  <div id="knobs"></div>
  <div class="foot"><button id="reset">RESET</button><button id="export">EXPORT THEME</button></div>
  <textarea id="out" readonly></textarea>
</div>
<div id="hint">drag = orbit · scroll = zoom<br>rebuilds ~0.3s after a change</div>
<div id="busy">rebuilding…</div>

<script type="module">
import * as THREE from 'three';
import { TRACKS } from './src/track/tracks/index.js';
import { THEMES } from './src/worlds/themes.js';
import { TrackSpline } from './src/track/spline.js';
import { buildScenery } from './src/track/scenery.js';
import { buildTrackMesh } from './src/track/trackMesh.js';
import { TUNING } from './src/config.js';

const WORLDS = [
  { key: 'desert', label: 'SUNSET MESA', track: 0 },
  { key: 'tropic', label: 'PALM COAST', track: 2 },
  { key: 'city', label: 'NEON SPRAWL', track: 4 },
];

// The knob schema: every colour/number a world's look is made of.
// (Baked at build time -> changes trigger a debounced rebuild.)
const COLOR_KEYS = [
  ['SKY', [['sky.zenith','zenith'],['sky.upper','upper'],['sky.band','band'],['sky.horizon','horizon'],
           ['sky.hot','hot'],['sky.sunCore','sun core'],['sky.sunStripe','sun stripe'],['sky.cloud','cloud']]],
  ['AIR', [['fog','fog']]],
  ['GROUND', [['ground','ground'],['groundB','ground B'],['waterB','water B'],['sand','sand'],['gridGlow','grid glow']]],
  ['ROCK / BUILDINGS', [['mesaLit','lit side'],['mesaShadow','shadow side'],['mesaRim','rim'],['mountainFar','far ridge'],['rock','rocks'],['warm','warm light']]],
  ['ROAD', [['trackBase','track base'],['trackBand','track band']]],
];
const NUM_KEYS = [
  ['SUN & SKY DIALS', [
    ['sky.sunSize','sun size',0.05,0.3,0.005],
    ['sky.sunStripes','sun stripes',0,1,0.05],
    ['sky.starLevel','star level',0.98,1,0.001],
    ['sky.cloudAmp','cloud amount',0,0.8,0.02],
    ['sky.cloudPuff','cloud puff',0.8,3.5,0.1],
  ]],
  ['POST (approx)', [
    ['grade.contrast','contrast',0.9,1.3,0.01],
    ['grade.saturation','saturation',0.8,1.5,0.01],
  ]],
];

const get = (obj, path) => path.split('.').reduce((o, k) => (o == null ? undefined : o[k]), obj);
const set = (obj, path, v) => { const ks = path.split('.'); const last = ks.pop(); let o = obj; for (const k of ks) o = o[k]; o[last] = v; };
const hexStr = (n) => '#' + ((n >>> 0) & 0xffffff).toString(16).padStart(6, '0');
const deepClone = (o) => JSON.parse(JSON.stringify(o));

// ---- renderer / scene ------------------------------------------------------
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 1.5));
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 2200);
function resize() { renderer.setSize(innerWidth, innerHeight, false); camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize', resize); resize();

let wi = 0;                      // world index
let theme = null;                // working copy (edited)
let spline = null, world = null, track = null;
let sFrac = 0.35;                // where on the lap the camera sits
let az = 0, pol = 1.35, rad = 16; // orbit around the track point (az relative to track tangent)

function disposeTree(root) {
  root.traverse((o) => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) for (const m of Array.isArray(o.material) ? o.material : [o.material]) { if (m.map) m.map.dispose(); m.dispose(); }
  });
}

const busyEl = document.getElementById('busy');
function rebuild() {
  busyEl.style.opacity = 1;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (world) { scene.remove(world.group, world.sky); disposeTree(world.group); disposeTree(world.sky); }
    if (track) { scene.remove(track.group); disposeTree(track.group); }
    scene.fog = new THREE.Fog(theme.fog, TUNING.FOG_NEAR, TUNING.FOG_FAR);
    world = buildScenery(spline, scene, theme); // adds the sky itself
    scene.add(world.group);
    track = buildTrackMesh(spline, theme);
    scene.add(track.group);
    applyGrade();
    busyEl.style.opacity = 0;
  }));
}
let rebuildT = null;
const queueRebuild = () => { clearTimeout(rebuildT); rebuildT = setTimeout(rebuild, 300); };

function applyGrade() {
  const g = theme.grade || { contrast: 1, saturation: 1 };
  canvas.style.filter = `contrast(${g.contrast ?? 1}) saturate(${g.saturation ?? 1})`;
}

function loadWorld(i) {
  wi = i;
  theme = deepClone(THEMES[WORLDS[i].key]);
  spline = new TrackSpline(TRACKS[WORLDS[i].track]);
  renderWorldButtons();
  renderKnobs();
  rebuild();
}

// ---- camera ----------------------------------------------------------------
const _f = { pos: new THREE.Vector3(), T: new THREE.Vector3(), R: new THREE.Vector3(), U: new THREE.Vector3(), width: 8, bank: 0, kappa: 0, slope: 0, splitHalf: 0 };
function updateCam() {
  const s = sFrac * spline.length;
  spline.frameAt(s, _f);
  const tAng = Math.atan2(_f.T.x, _f.T.z);
  const a = tAng + az;
  camera.position.set(
    _f.pos.x + Math.sin(a) * Math.sin(pol) * -rad,
    _f.pos.y + Math.cos(pol) * rad + 2.2,
    _f.pos.z + Math.cos(a) * Math.sin(pol) * -rad,
  );
  camera.lookAt(_f.pos.x + Math.sin(a) * 30, _f.pos.y + 2, _f.pos.z + Math.cos(a) * 30);
}
let dragging = false, px0 = 0, py0 = 0;
canvas.addEventListener('pointerdown', (e) => { dragging = true; px0 = e.clientX; py0 = e.clientY; });
addEventListener('pointerup', () => { dragging = false; });
addEventListener('pointermove', (e) => {
  if (!dragging) return;
  az += (e.clientX - px0) * 0.005; pol = Math.max(0.6, Math.min(1.52, pol + (e.clientY - py0) * 0.004));
  px0 = e.clientX; py0 = e.clientY; updateCam();
});
canvas.addEventListener('wheel', (e) => { rad = Math.max(6, Math.min(60, rad + e.deltaY * 0.02)); updateCam(); });

const VIEWS = {
  'CHASE': () => { az = 0; pol = 1.38; rad = 14; },
  'SUN': () => { const sa = theme.sky.sunAz || [-0.35, -0.94]; const sunAng = Math.atan2(sa[0], sa[1]); const s = sFrac * spline.length; spline.frameAt(s, _f); az = sunAng - Math.atan2(_f.T.x, _f.T.z); pol = 1.42; rad = 12; },
  'HORIZON': () => { az = Math.PI * 0.5; pol = 1.42; rad = 12; },
  'HIGH': () => { az = 0; pol = 0.85; rad = 40; },
};

// ---- panel -----------------------------------------------------------------
const worldsEl = document.getElementById('worlds');
WORLDS.forEach((w, i) => { const b = document.createElement('button'); b.textContent = w.label; b.onclick = () => loadWorld(i); worldsEl.appendChild(b); });
function renderWorldButtons() { [...worldsEl.children].forEach((b, i) => b.classList.toggle('on', i === wi)); }
const viewsEl = document.getElementById('views');
Object.entries(VIEWS).forEach(([n, fn]) => { const b = document.createElement('button'); b.textContent = n; b.onclick = () => { fn(); updateCam(); }; viewsEl.appendChild(b); });

const sposEl = document.getElementById('spos'), sposV = document.getElementById('sposv');
sposEl.oninput = () => { sFrac = +sposEl.value; sposV.textContent = Math.round(sFrac * 100) + '%'; updateCam(); };

const knobsEl = document.getElementById('knobs');
function renderKnobs() {
  knobsEl.innerHTML = '';
  for (const [grp, keys] of COLOR_KEYS) {
    const present = keys.filter(([path]) => get(theme, path) != null);
    if (!present.length) continue;
    const g = document.createElement('div'); g.className = 'grp'; g.textContent = grp; knobsEl.appendChild(g);
    for (const [path, label] of present) {
      const row = document.createElement('div'); row.className = 'row';
      row.innerHTML = `<label>${label}</label><input type="color" value="${hexStr(get(theme, path))}"><span class="val"></span>`;
      const inp = row.querySelector('input');
      inp.oninput = () => { set(theme, path, parseInt(inp.value.slice(1), 16)); queueRebuild(); };
      knobsEl.appendChild(row);
    }
  }
  for (const [grp, keys] of NUM_KEYS) {
    const present = keys.filter(([path]) => get(theme, path) != null);
    if (!present.length) continue;
    const g = document.createElement('div'); g.className = 'grp'; g.textContent = grp; knobsEl.appendChild(g);
    for (const [path, label, min, max, step] of present) {
      const row = document.createElement('div'); row.className = 'row';
      const v = get(theme, path);
      row.innerHTML = `<label>${label}</label><input type="range" min="${min}" max="${max}" step="${step}" value="${v}"><span class="val">${v}</span>`;
      const inp = row.querySelector('input'), val = row.querySelector('.val');
      inp.oninput = () => {
        set(theme, path, +inp.value); val.textContent = inp.value;
        if (path.startsWith('grade.')) applyGrade(); else queueRebuild();
      };
      knobsEl.appendChild(row);
    }
  }
}

document.getElementById('reset').onclick = () => loadWorld(wi);
document.getElementById('export').onclick = () => {
  // Dump only what differs from the shipped theme — paste-ready into themes.js.
  const base = THEMES[WORLDS[wi].key];
  const diff = {};
  const walk = (t, b, out) => {
    for (const k in t) {
      if (typeof t[k] === 'object' && t[k] !== null && !Array.isArray(t[k])) { const sub = {}; walk(t[k], b[k] || {}, sub); if (Object.keys(sub).length) out[k] = sub; }
      else if (JSON.stringify(t[k]) !== JSON.stringify(b[k])) out[k] = t[k];
    }
  };
  walk(theme, base, diff);
  const fmt = (o, ind) => Object.entries(o).map(([k, v]) =>
    typeof v === 'object' ? `${ind}${k}: {\n${fmt(v, ind + '  ')}\n${ind}},`
      : `${ind}${k}: ${typeof v === 'number' && v > 255 ? '0x' + (v >>> 0).toString(16).padStart(6, '0') : v},`).join('\n');
  const out = document.getElementById('out');
  out.style.display = 'block';
  out.value = Object.keys(diff).length
    ? `// ${WORLDS[wi].key} — changed values (paste into themes.js)\n` + fmt(diff, '')
    : '// no changes from the shipped theme';
};

// ---- loop ------------------------------------------------------------------
let t0 = performance.now();
function loop() {
  requestAnimationFrame(loop);
  const t = (performance.now() - t0) / 1000;
  if (world) world.update(t, camera.position, 0);
  // Neutral ship uniforms: park the engine light-pool far away so the road
  // renders as it does without a ship on it.
  if (track) track.update(t, 0, -1e6, 0, 0, null, null, null, false);
  renderer.render(scene, camera);
}
loadWorld(0);
updateCam();
loop();
window.__lab = { get scene() { return scene; }, get spline() { return spline; }, get theme() { return theme; }, THREE };
</script>
</body>
</html>
